# Auto-loaded by `docker compose` alongside docker-compose.yml. Points
# Caddy at the local-smoke-test Caddyfile (self-signed certs, no real
# domains needed) instead of the real one. Delete this file -- or run
# `docker compose -f docker-compose.yml up` to bypass it -- once you're
# configuring a real deployment with real domains.
services:
  caddy:
    volumes:
      - ./Caddyfile.local:/etc/caddy/Caddyfile:ro

# Bundles litterae with the frontend, plus the optional services it can
# talk to: rspamd (spam scoring), ClamAV (malware scanning), Caddy
# (serves the frontend + terminates HTTPS in front of JMAP/admin -- no
# separate web server needed for the static frontend), and the CrowdSec
# engine (network-level ban decisions -- see crowdsec/README.md for why
# the firewall bouncer that *enforces* those decisions is a host install,
# not a container here).
#
# Before running: copy .env.example to .env and edit it -- that's the one
# file this whole stack reads its configuration from.

services:
  litterae:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    ports:
      # SMTP/submission are raw TCP (STARTTLS/implicit TLS handled by
      # litterae itself), so they're published directly -- Caddy is an
      # HTTP reverse proxy and can't front these.
      - "25:25"
      - "587:587"
      - "465:465"
      # JMAP/admin are intentionally NOT published here -- only reachable
      # through Caddy below, which terminates TLS for them.
    volumes:
      - litterae-data:/data
      - litterae-logs:/var/log/litterae
      # World-readable copies of Caddy's cert for MAIL_HOSTNAME, kept in
      # sync by cert-sync below -- lets submission (587/465) share the
      # same Let's Encrypt cert Caddy already holds, without a second
      # ACME client. Unused unless submission.tls_cert_path/tls_key_path
      # are set via the escape hatch below; see README's "A note on
      # submission" section. (Caddy's own cert storage is 0700-owned by
      # root -- litterae runs as its own non-root user and can't read it
      # directly, which is why this goes through cert-sync instead of a
      # direct mount of caddy-data.)
      - submission-certs:/submission-certs:ro
      # Escape hatch: bind-mount a hand-written config to skip the
      # .env-driven template entirely (docker/entrypoint.sh only
      # generates one if this path doesn't already exist).
      # - ./litterae.toml:/etc/litterae/litterae.toml:ro
    depends_on:
      - rspamd
      - clamav

  rspamd:
    image: rspamd/rspamd:4.1.1
    restart: unless-stopped
    volumes:
      - rspamd-data:/var/lib/rspamd

  clamav:
    image: clamav/clamav:1.5.3-debian
    restart: unless-stopped
    volumes:
      - clamav-data:/var/lib/clamav

  caddy:
    build:
      context: .
      dockerfile: web/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - litterae

  crowdsec:
    build:
      context: ./crowdsec
    restart: unless-stopped
    environment:
      COLLECTIONS: ""
    ports:
      # CrowdSec's local API, for a firewall bouncer installed on the
      # Docker host to reach (see crowdsec/README.md).
      - "8080:8080"
    volumes:
      - litterae-logs:/var/log/litterae:ro
      - crowdsec-data:/var/lib/crowdsec/data
    depends_on:
      - litterae

  # Copies Caddy's cert for MAIL_HOSTNAME out of Caddy's own (root-only,
  # 0700) storage into a world-readable location litterae's non-root user
  # can read -- see the litterae service's `submission-certs` mount above.
  # Re-copies hourly so a Let's Encrypt renewal doesn't go stale here;
  # restart the litterae container afterwards to pick up a renewed cert
  # (see README's "A note on submission"). Entirely inert/unused unless
  # submission TLS is explicitly enabled via the litterae.toml escape
  # hatch -- safe to leave running otherwise.
  cert-sync:
    image: alpine:3.22
    restart: unless-stopped
    environment:
      MAIL_HOSTNAME: ${MAIL_HOSTNAME}
    volumes:
      - caddy-data:/caddy-data:ro
      - submission-certs:/out
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        while true; do
          src="/caddy-data/caddy/certificates/acme-v02.api.letsencrypt.org-directory/$$MAIL_HOSTNAME"
          # Local-testing fallback: Caddyfile.local uses Caddy's internal
          # CA instead of real ACME, which files certs under "local".
          [ -d "$$src" ] || src="/caddy-data/caddy/certificates/local/$$MAIL_HOSTNAME"
          if [ -f "$$src/$$MAIL_HOSTNAME.crt" ]; then
            cp "$$src/$$MAIL_HOSTNAME.crt" /out/submission.crt.tmp
            cp "$$src/$$MAIL_HOSTNAME.key" /out/submission.key.tmp
            chmod 644 /out/submission.crt.tmp /out/submission.key.tmp
            mv /out/submission.crt.tmp /out/submission.crt
            mv /out/submission.key.tmp /out/submission.key
          fi
          sleep 3600
        done

volumes:
  litterae-data:
  litterae-logs:
  rspamd-data:
  clamav-data:
  caddy-data:
  caddy-config:
  crowdsec-data:
  submission-certs:
